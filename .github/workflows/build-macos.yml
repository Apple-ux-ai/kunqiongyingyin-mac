# macOS 便携版 ZIP（GitHub Actions）
# 说明：云端 runner 为 Apple Silicon，universal 会缺 darwin-x64 FFmpeg 导致失败；
#       此处仅打 arm64 ZIP，适用于 M 系列 Mac；Intel Mac 需在本地或其它环境打 universal。
name: macOS 便携版 ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 解析源码目录（含 package.json）
        id: appdir
        shell: bash
        run: |
          if [ -f "鲲穹影音源码/package.json" ]; then
            echo "dir=鲲穹影音源码" >> "$GITHUB_OUTPUT"
            echo "使用目录: 鲲穹影音源码"
          elif [ -f "kunqiongyingyin-mac/package.json" ]; then
            echo "dir=kunqiongyingyin-mac" >> "$GITHUB_OUTPUT"
            echo "使用目录: kunqiongyingyin-mac"
          elif [ -f "package.json" ] && grep -q '"electron"' package.json 2>/dev/null; then
            echo "dir=." >> "$GITHUB_OUTPUT"
            echo "使用目录: 仓库根目录"
          else
            echo "::error::未找到 package.json。根目录："
            ls -la
            exit 1
          fi

      - name: 使用 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 确保 mac 图标（electron-builder 不接受过小占位图）
        working-directory: ${{ steps.appdir.outputs.dir }}
        shell: bash
        run: |
          if [ -f kq-ai-v113-final.png ]; then
            echo "已存在 kq-ai-v113-final.png"
            exit 0
          fi
          for src in app-icon-final.png app-icon-new.png; do
            if [ -f "$src" ]; then
              cp "$src" kq-ai-v113-final.png
              echo "已复制 $src -> kq-ai-v113-final.png"
              exit 0
            fi
          done
          echo "::error::缺少 kq-ai-v113-final.png，且未找到 app-icon-final.png / app-icon-new.png。请在项目根提交其一。"
          ls -la *.png *.ico 2>/dev/null || ls -la
          exit 1

      - name: 安装依赖
        working-directory: ${{ steps.appdir.outputs.dir }}
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "::warning::未找到 package-lock.json，改用 npm install"
            npm install
          fi

      - name: 打包 ZIP（arm64，未签名）
        working-directory: ${{ steps.appdir.outputs.dir }}
        shell: bash
        run: |
          npx electron-builder --mac zip --arm64 \
            -c.mac.identity=null \
            -c.mac.hardenedRuntime=false \
            '-c.mac.artifactName=${productName}-${version}-mac-arm64.${ext}'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: 上传 ZIP
        uses: actions/upload-artifact@v4
        with:
          name: kunqiong-mac-portable-arm64
          path: ${{ steps.appdir.outputs.dir }}/dist/*.zip
          if-no-files-found: error
