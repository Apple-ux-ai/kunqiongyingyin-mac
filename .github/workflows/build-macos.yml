# macOS 便携版：仅打 ZIP（内含 .app，解压后双击即用）。必须在 macOS 上构建，故用云端 runner。
# 本机 Windows 无法执行 electron-builder --mac，请推送到 GitHub → Actions → 手动运行本工作流 → 下载 Artifact。
name: macOS 便携版 ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: 鲲穹影音源码

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 使用 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: 鲲穹影音源码/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 仅打包便携版（ZIP，通用 arm64+x64）
        run: npm run build-mac-portable
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: 上传 ZIP
        uses: actions/upload-artifact@v4
        with:
          name: kunqiong-mac-portable-zip
          path: 鲲穹影音源码/dist/*.zip
          if-no-files-found: error
