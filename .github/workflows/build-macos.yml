# macOS 便携版 ZIP ×2：arm64（Apple Silicon）与 x64（Intel）
# 均在 macos-latest（ARM runner）上交叉打包；x64 任务会额外安装 darwin-x64 FFmpeg。
name: macOS 便携版 ZIP

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]

    runs-on: macos-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 解析源码目录
        id: appdir
        shell: bash
        run: |
          set -e
          if [ -f "鲲穹影音源码/package.json" ]; then
            echo "dir=鲲穹影音源码" >> "$GITHUB_OUTPUT"
          elif [ -f "kunqiongyingyin-mac/package.json" ]; then
            echo "dir=kunqiongyingyin-mac" >> "$GITHUB_OUTPUT"
          elif [ -f "package.json" ] && grep -q '"electron"' package.json 2>/dev/null; then
            echo "dir=." >> "$GITHUB_OUTPUT"
          else
            echo "::error::未找到含 electron 的 package.json"
            ls -la
            exit 1
          fi

      - name: 使用 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 准备 mac 图标（PNG）
        working-directory: ${{ steps.appdir.outputs.dir }}
        shell: bash
        run: |
          set -e
          if [ ! -f kq-ai-v113-final.png ]; then
            curl -fsSL -o kq-ai-v113-final.png "https://www.w3.org/Graphics/PNG/nurbcup2si.png"
          fi
          ls -la kq-ai-v113-final.png

      - name: 由 PNG 生成 kq-ai-v113-final.icns
        working-directory: ${{ steps.appdir.outputs.dir }}
        shell: bash
        run: |
          set -e
          SRC=kq-ai-v113-final.png
          IK=kq.iconset
          rm -rf "$IK"
          mkdir "$IK"
          sips -z 16 16     "$SRC" --out "$IK/icon_16x16.png"
          sips -z 32 32     "$SRC" --out "$IK/icon_16x16@2x.png"
          sips -z 32 32     "$SRC" --out "$IK/icon_32x32.png"
          sips -z 64 64     "$SRC" --out "$IK/icon_32x32@2x.png"
          sips -z 128 128   "$SRC" --out "$IK/icon_128x128.png"
          sips -z 256 256   "$SRC" --out "$IK/icon_128x128@2x.png"
          sips -z 256 256   "$SRC" --out "$IK/icon_256x256.png"
          sips -z 512 512   "$SRC" --out "$IK/icon_256x256@2x.png"
          sips -z 512 512   "$SRC" --out "$IK/icon_512x512.png"
          sips -z 1024 1024 "$SRC" --out "$IK/icon_512x512@2x.png"
          iconutil -c icns "$IK" -o kq-ai-v113-final.icns
          ls -la kq-ai-v113-final.icns
          rm -rf "$IK"

      - name: 安装依赖
        working-directory: ${{ steps.appdir.outputs.dir }}
        shell: bash
        run: |
          set -e
          if [ -f package-lock.json ]; then
            npm ci --legacy-peer-deps
          else
            npm install --legacy-peer-deps
          fi

      # ARM runner 上 npm ci 不会安装 cpu=x64 的可选 FFmpeg，Intel 包打包前强制装入
      - name: 安装 Intel 版 FFmpeg 二进制（仅 x64 矩阵）
        if: matrix.arch == 'x64'
        working-directory: ${{ steps.appdir.outputs.dir }}
        shell: bash
        run: |
          set -e
          npm install --no-save @ffmpeg-installer/darwin-x64@4.1.0 @ffprobe-installer/darwin-x64@5.1.0

      - name: 打包 ZIP
        working-directory: ${{ steps.appdir.outputs.dir }}
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          set -e
          ARCH="${{ matrix.arch }}"
          npx electron-builder --mac zip --"$ARCH" \
            -c.mac.forceCodeSigning=false \
            -c.mac.hardenedRuntime=false \
            "-c.mac.artifactName=\${productName}-\${version}-mac-${ARCH}.\${ext}"

      - name: 列出 dist
        if: success() || failure()
        shell: bash
        run: |
          D="${{ steps.appdir.outputs.dir }}"
          ls -la "$D/dist" 2>/dev/null || echo "无 dist 目录"

      - name: 上传 ZIP
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kunqiong-mac-${{ matrix.arch }}
          path: ${{ steps.appdir.outputs.dir }}/dist/*.zip
          if-no-files-found: error
